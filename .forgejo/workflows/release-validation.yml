name: Release Validation

# Runs the test suite in both linkage modes before a release is tagged.
# Per-PR CI exercises the default (static) path; this workflow additionally
# validates the opt-in shared path so it doesn't rot between releases.
#
# Trigger manually via workflow_dispatch before pushing a release tag.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: git.tomfos.tr

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: git.tomfos.tr/tom/llama-go:build-cuda
    strategy:
      fail-fast: false
      matrix:
        linkage: [static, shared]
    env:
      LIBRARY_PATH: ${{ github.workspace }}
      C_INCLUDE_PATH: ${{ github.workspace }}
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      CMAKE_CUDA_COMPILER_LAUNCHER: sccache
      SCCACHE_GHA_ENABLED: "true"
      TEST_CHAT_MODEL: Qwen3-0.6B-Q8_0.gguf
      TEST_EMBEDDING_MODEL: Qwen3-Embedding-0.6B-Q8_0.gguf
      LLAMA_LOG: error
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect versions
        id: versions
        uses: https://git.tomfos.tr/actions/detect-versions@v1

      - name: Cache test models
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            Qwen3-0.6B-Q8_0.gguf
            Qwen3-Embedding-0.6B-Q8_0.gguf
          key: test-models-qwen3-0.6b-q8-v1

      - name: Cache dependencies
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ steps.versions.outputs.slug }}-${{ steps.versions.outputs.arch }}-${{ matrix.linkage }}-go-${{ hashFiles('llama.cpp/.git/HEAD', 'wrapper.cpp', 'wrapper.h', '**/go.sum') }}
          restore-keys: |
            ${{ steps.versions.outputs.slug }}-${{ steps.versions.outputs.arch }}-${{ matrix.linkage }}-go-

      - name: Setup sccache
        uses: https://git.tomfos.tr/tom/sccache-action@v1

      - name: Build library (linkage=${{ matrix.linkage }})
        run: |
          BUILD_TYPE=cublas CUDA_ARCHITECTURES=86 BUILD_LINKAGE=${{ matrix.linkage }} make libbinding.a

      - name: List built artefacts
        run: |
          echo "=== Workspace root ==="
          ls -la *.a *.so 2>/dev/null || echo "no artefacts"

      - name: Download test models
        run: |
          if [ ! -f Qwen3-0.6B-Q8_0.gguf ]; then
            wget -q https://huggingface.co/Qwen/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q8_0.gguf
          fi
          if [ ! -f Qwen3-Embedding-0.6B-Q8_0.gguf ]; then
            wget -q https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf
          fi

      - name: Compute Go build tags
        id: tags
        run: |
          if [ "${{ matrix.linkage }}" = "shared" ]; then
            echo "tags=cublas shared_lib" >> "$GITHUB_OUTPUT"
          else
            echo "tags=cublas" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: |
          go run github.com/onsi/ginkgo/v2/ginkgo -tags '${{ steps.tags.outputs.tags }}' -v ./...

      - name: Run example
        run: |
          go run -tags '${{ steps.tags.outputs.tags }}' ./examples/simple -m Qwen3-0.6B-Q8_0.gguf -p 'Hello world' -n 50
